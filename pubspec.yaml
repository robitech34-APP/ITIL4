name: itil4_exam_app
description: "Practice exams and study guide for the ITIL 4 Foundation certification."
publish_to: 'none'

version: 1.1.0+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15
  google_mobile_ads: ^6.0.0
  flutter_pdfview: ^1.3.2
  syncfusion_flutter_pdfviewer: ^31.2.16   # ⬅️ updated
 # _fe_analyzer_shared: ^92.0.0
  lints: ^6.0.0
  test_api: ^0.7.7
  source_helper: ^1.3.5
  characters: ^1.4.0
  radio_group_v2: ^3.3.1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1A5C7E"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_foreground_inset: 8
  min_sdk_android: 21



flutter:
  uses-material-design: true
  assets:
    - assets/summary.pdf
